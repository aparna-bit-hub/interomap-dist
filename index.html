<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>InteroMap Qualtrics Wrapper</title>
</head>

<body style="margin:0;">

<iframe 
  id="interomap"
  style="width:100%; height:100vh; border:none;">
</iframe>

<script>
// -------- GET PERSONA FROM URL --------
const urlParams = new URLSearchParams(window.location.search);
let persona = urlParams.get("persona");

// fallback
if (persona !== "male" && persona !== "female") {
    persona = "female";
}

// -------- FORCE LOAD MALE/FEMALE VERSION --------
const baseURL = "https://interomap.github.io/interomap-dist/";

const iframe = document.getElementById("interomap");

// Force reload with correct parameter
iframe.src = baseURL + "?lang=en&persona=" + persona + "&t=" + Date.now();


// -------- SEND DATA TO QUALTRICS --------
window.addEventListener("message", function(event) {
    if (event.data && event.data.event === "interomap_data") {
        window.parent.postMessage({
            type: "interomap_data",
            payload: event.data.output
        }, "*");
    }
});


// -------- RECEIVE REQUEST FROM QUALTRICS --------
window.addEventListener("message", function(event) {
    if (event.data && event.data.type === "REQUEST_DATA") {
        iframe.contentWindow.postMessage({
            event: "export_data"
        }, "*");
    }
});
</script>

</body>
</html>
