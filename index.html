<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>InteroMap Qualtrics Wrapper</title>
</head>

<body style="margin:0;">

<iframe 
  id="interomap"
  <script>
const urlParams = new URLSearchParams(window.location.search);
const persona = urlParams.get("persona") || "female";

document.write(`
<iframe 
  id="interomap"
  src="https://interomap.github.io/interomap-dist/?lang=en&persona=${persona}"
  style="width:100%; height:100vh; border:none;">
</iframe>
`);
</script>
  style="width:100%; height:100vh; border:none;">
</iframe>

<script>
window.addEventListener("message", function(event) {
    // forward data to Qualtrics
    if (event.data && event.data.event === "interomap_data") {
        window.parent.postMessage({
            type: "interomap_data",
            payload: event.data.output
        }, "*");
    }
});

// listen for request from Qualtrics
window.addEventListener("message", function(event) {
    if (event.data && event.data.type === "REQUEST_DATA") {
        document.getElementById("interomap").contentWindow.postMessage({
            event: "export_data"
        }, "*");
    }
});
</script>

</body>
</html>
