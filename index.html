<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>InteroMap Qualtrics Wrapper</title>
</head>

<body style="margin:0;">

<iframe 
  id="interomap"
  style="width:100%; height:100vh; border:none;">
</iframe>

<script>
// ----------- LOAD CORRECT PERSONA -----------
const urlParams = new URLSearchParams(window.location.search);
const persona = urlParams.get("persona") || "female";

const iframe = document.getElementById("interomap");

// set source dynamically
iframe.src = "https://interomap.github.io/interomap-dist/?lang=en&persona=" + persona;


// ----------- SEND DATA TO QUALTRICS -----------
window.addEventListener("message", function(event) {
    if (event.data && event.data.event === "interomap_data") {
        window.parent.postMessage({
            type: "interomap_data",
            payload: event.data.output
        }, "*");
    }
});


// ----------- RECEIVE REQUEST FROM QUALTRICS -----------
window.addEventListener("message", function(event) {
    if (event.data && event.data.type === "REQUEST_DATA") {
        iframe.contentWindow.postMessage({
            event: "export_data"
        }, "*");
    }
});
</script>

</body>
</html>
